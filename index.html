<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush's Ultimate Trading Journal</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .auth-container {
            max-width: 400px;
            margin: 40px auto;
            background: #161b22;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #58a6ff; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #8b949e; }
        .input-group input { width: 92%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: #238636; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn:hover { background: #2ea44f; }
        .btn-sec { background: #21262d; border: 1px solid #30363d; color: #58a6ff; }
        .btn-sec:hover { background: #30363d; }
        .switch-link { text-align: center; margin-top: 20px; color: #8b949e; font-size: 0.85rem; }
        .switch-link a { color: #58a6ff; text-decoration: none; font-weight: bold; }
        
        #dashboard { display: none; max-width: 1100px; margin: 0 auto; }
        .main-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d; text-align: center; }
        
        .calendar-card { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day-name { font-weight: bold; color: #8b949e; padding: 5px 0; font-size: 0.85rem; }
        .calendar-day { padding: 10px 0; background: #0d1117; border-radius: 4px; font-size: 0.9rem; border: 1px solid #21262d; }
        
        .cal-profit { background-color: #1f6e37 !important; color: white !important; font-weight: bold; box-shadow: 0 0 5px #2ea44f; }
        .cal-loss { background-color: #8e1c19 !important; color: white !important; font-weight: bold; box-shadow: 0 0 5px #f85149; }
        .cal-both { background-color: #b07e00 !important; color: white !important; font-weight: bold; }

        .journal-form { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .form-grid input { padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; width: 88%; }
        
        .table-container { background: #161b22; border-radius: 8px; border: 1px solid #30363d; padding: 10px; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #30363d; font-size: 0.95rem; }
        th { color: #58a6ff; }
        
        .text-profit { color: #2ea44f; font-weight: bold; }
        .text-loss { color: #f85149; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <h2>Trader Login</h2>
        <div class="input-group">
            <label>Username ID</label>
            <input type="text" id="loginUser" placeholder="Enter User ID">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Enter Password">
        </div>
        <button class="btn" onclick="handleLogin()">Sign In</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #30363d; padding-top: 15px;">
            <button class="btn btn-sec" onclick="showPage('registerPage')">➕ Naya Profile Banayein (Register)</button>
        </div>
        
        <div class="switch-link">
            <a href="mailto:ayushk92355@gmail.com?subject=Trading%20Journal%20Password%20Change%20Request&body=Hi%20Ayush,%20I%20want%20to%20change%20my%20trading%20journal%20profile%20password.%20My%20User%20ID%20is:%20">
               🔑 Forgot / Change Password?
            </a>
        </div>
    </div>

    <div id="registerPage" class="auth-container" style="display: none;">
        <h2>Create Trader Profile</h2>
        <div class="input-group">
            <label>Choose User ID</label>
            <input type="text" id="regUser" placeholder="This cannot be changed later">
        </div>
        <div class="input-group">
            <label>Set Password</label>
            <input type="password" id="regPass" placeholder="Enter Password">
        </div>
        <button class="btn" style="background: #1f6feb;" onclick="handleRegister()">Create Permanent Profile</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #30363d; padding-top: 15px;">
            <button class="btn btn-sec" onclick="showPage('loginPage')">⬅️ Puraani ID Hai? Login Page</button>
        </div>
    </div>

    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px;">
            <h2 style="color: #58a6ff; margin: 0;">📊 Dashboard: <span id="displayTrader">Trader</span></h2>
            <button style="padding: 8px 15px; background: #da3633; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="logout()">Logout</button>
        </div>

        <div class="main-layout">
            <div style="flex: 2;">
                <div class="stats-grid">
                    <div class="stat-card" style="border-top: 4px solid #238636;">
                        <h4 style="margin:0; color:#8b949e;">Total Profit</h4>
                        <p id="totalProfitBox" style="font-size: 1.5rem; color: #2ea44f; margin: 5px 0 0 0;">₹0</p>
                    </div>
                    <div class="stat-card" style="border-top: 4px solid #da3633;">
                        <h4 style="margin:0; color:#8b949e;">Total Loss</h4>
                        <p id="totalLossBox" style="font-size: 1.5rem; color: #f85149; margin: 5px 0 0 0;">₹0</p>
                    </div>
                    <div class="stat-card" id="netPlCard" style="border-top: 4px solid #8b949e;">
                        <h4 style="margin:0; color:#8b949e;">Net P&L</h4>
                        <p id="netPlBox" style="font-size: 1.5rem; margin: 5px 0 0 0;">₹0</p>
                    </div>
                </div>

                <div class="journal-form">
                    <h3 id="formTitle" style="margin-top: 0; color: #58a6ff;">📝 Log New Trade</h3>
                    <input type="hidden" id="editTradeId" value="">
                    <div class="form-grid">
                        <div>
                            <label style="font-size:0.8rem; color:#8b949e;">Date</label>
                            <input type="date" id="tradeDate">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#8b949e;">Stock/Option Name</label>
                            <input type="text" id="scriptName" placeholder="e.g., NIFTY 23400 CE">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#8b949e;">Quantity</label>
                            <input type="number" id="tradeQty" placeholder="e.g., 75">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#8b949e;">Stop Loss (SL)</label>
                            <input type="number" id="tradeSL" placeholder="SL level">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#8b949e;">Entry Price</label>
                            <input type="number" id="entryPrice" placeholder="Buy Price">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#8b949e;">Exit Price</label>
                            <input type="number" id="exitPrice" placeholder="Sell Price">
                        </div>
                    </div>
                    <button class="btn" id="saveBtn" onclick="saveOrUpdateTrade()">Calculate & Save Trade</button>
                    <button class="btn" id="cancelEditBtn" style="background:#30363d; margin-top:5px; display:none;" onclick="resetForm()">Cancel Edit</button>
                </div>
            </div>

            <div style="flex: 1;">
                <div class="calendar-card">
                    <div class="calendar-header">
                        <h3 style="margin:0; color:#58a6ff;" id="calendarMonthYear">Month Year</h3>
                    </div>
                    <div class="calendar-grid" id="calendarDaysContainer"></div>
                    <p style="font-size:0.75rem; color:#8b949e; margin-top:15px; text-align:center;">🟢 Profit Days | 🔴 Loss Days</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h3>📜 Your Saved Log History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Script Name</th>
                        <th>Quantity</th>
                        <th>SL Price</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Status</th>
                        <th>Net P&L (₹)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="journalLogsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentActiveUser = "";

        function showPage(pageId) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('registerPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
        }

        function handleRegister() {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if(!user || !pass) { alert('User ID aur Password dono dalein!'); return; }
            if(localStorage.getItem('profile_' + user)) { alert('Yeh User ID pehle se li ja chuki hai!'); return; }

            localStorage.setItem('profile_' + user, pass);
            localStorage.setItem('trades_' + user, JSON.stringify([]));

            alert('Profile successfully bana di gayi hai! Ab aap Login kar sakte hain.');
            showPage('loginPage');
            document.getElementById('regUser').value = '';
            document.getElementById('regPass').value = '';
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const savedPass = localStorage.getItem('profile_' + user);

            if(savedPass && savedPass === pass) {
                currentActiveUser = user;
                document.getElementById('displayTrader').innerText = user;
                showPage('dashboard');
                loadTraderData();
            } else {
                alert('Galat ID ya Password! Pehle Register karein.');
            }
        }

        function saveOrUpdateTrade() {
            const date = document.getElementById('tradeDate').value;
            const script = document.getElementById('scriptName').value.trim();
            const qty = parseInt(document.getElementById('tradeQty').value);
            const sl = document.getElementById('tradeSL').value;
            const entry = parseFloat(document.getElementById('entryPrice').value);
            const exit = parseFloat(document.getElementById('exitPrice').value);
            const editId = document.getElementById('editTradeId').value;

            if(!date || !script || !qty || !entry || !exit) {
                alert('Saari fields bharo bhai!');
                return;
            }

            const netCalculation = (exit - entry) * qty;
            const type = netCalculation >= 0 ? 'PROFIT' : 'LOSS';
            const finalAmount = Math.abs(netCalculation);

            let userTrades = JSON.parse(localStorage.getItem('trades_' + currentActiveUser)) || [];

            if(editId) {
                userTrades = userTrades.map(t => {
                    if(t.id == editId) {
                        return { ...t, date, script, qty, sl: sl||'N/A', entry, exit, type, amount: finalAmount };
                    }
                    return t;
                });
                alert('Trade data updated successfully!');
            } else {
                const newTradeObj = { id: Date.now(), date, script, qty, sl: sl||'N/A', entry, exit, type, amount: finalAmount };
                userTrades.push(newTradeObj);
                alert('New trade calculated & saved!');
            }

            localStorage.setItem('trades_' + currentActiveUser, JSON.stringify(userTrades));
            resetForm();
            loadTraderData();
        }

        function editTrade(tradeId) {
            const userTrades = JSON.parse(localStorage.getItem('trades_' + currentActiveUser)) || [];
            const trade = userTrades.find(t => t.id == tradeId);

            if(trade) {
                document.getElementById('editTradeId').value = trade.id;
                document.getElementById('tradeDate').value = trade.date;
                document.getElementById('scriptName').value = trade.script;
                document.getElementById('tradeQty').value = trade.qty;
                document.getElementById('tradeSL').value = trade.sl === 'N/A' ? '' : trade.sl;
                document.getElementById('entryPrice').value = trade.entry;
                document.getElementById('exitPrice').value = trade.exit;

                document.getElementById('formTitle').innerText = "✏️ Edit Selected Trade Details";
                document.getElementById('saveBtn').innerText = "Apply Edits & Recalculate";
                document.getElementById('cancelEditBtn').style.display = "block";
                document.getElementById('formTitle').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetForm() {
            document.getElementById('editTradeId').value = "";
            document.getElementById('tradeDate').value = "";
            document.getElementById('scriptName').value = "";
            document.getElementById('tradeQty').value = "";
            document.getElementById('tradeSL').value = "";
            document.getElementById('entryPrice').value = "";
            document.getElementById('exitPrice').value = "";

            document.getElementById('formTitle').innerText = "📝 Log New Trade";
            document.getElementById('saveBtn').innerText = "Calculate & Save Trade";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        function loadTraderData() {
            const tbody = document.getElementById('journalLogsTable');
            tbody.innerHTML = "";
            const userTrades = JSON.parse(localStorage.getItem('trades_' + currentActiveUser)) || [];

            let totalProfit = 0, totalLoss = 0;
            let dateColorMap = {}; 

            userTrades.forEach((trade) => {
                const tr = document.createElement('tr');
                const isProf = trade.type === 'PROFIT';
                const statusClass = isProf ? 'text-profit' : 'text-loss';
                const sign = isProf ? '+ ₹' : '- ₹';

                if(isProf) totalProfit += trade.amount;
                else totalLoss += trade.amount;

                const dateKey = trade.date; 
                if(!dateColorMap[dateKey]) {
                    dateColorMap[dateKey] = trade.type;
                } else if(dateColorMap[dateKey] !== trade.type) {
                    dateColorMap[dateKey] = 'BOTH';
                }

                tr.innerHTML = `
                    <td>${trade.date}</td>
                    <td>${trade.script}</td>
                    <td>${trade.qty}</td>
                    <td>${trade.sl}</td>
                    <td>₹${trade.entry}</td>
                    <td>₹${trade.exit}</td>
                    <td><span class="${statusClass}">${trade.type}</span></td>
                    <td class="${statusClass}">${sign}${trade.amount}</td>
                    <td>
                        <button style="background:#1f6feb; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; margin-right:5px;" onclick="editTrade(${trade.id})">Edit</button>
                        <button style="background:#da3633; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer;" onclick="deleteTrade(${trade.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalProfitBox').innerText = '₹' + totalProfit;
            document.getElementById('totalLossBox').innerText = '₹' + totalLoss;
            const netPL = totalProfit - totalLoss;
            const netBox = document.getElementById('netPlBox');
            const netCard = document.getElementById('netPlCard');
            netBox.innerText = (netPL >= 0 ? '+ ₹' : '- ₹') + Math.abs(netPL);
            
            if(netPL > 0) { netBox.className = 'text-profit'; netCard.style.borderTop = '4px solid #238636'; }
            else if (netPL < 0) { netBox.className = 'text-loss'; netCard.style.borderTop = '4px solid #da3633'; }
            else { netBox.className = ''; netBox.style.color = 'white'; netCard.style.borderTop = '4px solid #8b949e'; }

            buildCalendarGrid(dateColorMap);
        }

        function buildCalendarGrid(dateColorMap) {
            const container = document.getElementById('calendarDaysContainer');
            const headings = `
                <div class="calendar-day-name">Su</div><div class="calendar-day-name">Mo</div><div class="calendar-day-name">Tu</div>
                <div class="calendar-day-name">We</div><div class="calendar-day-name">Th</div><div class="calendar-day-name">Fr</div>
                <div class="calendar-day-name">Sa</div>
            `;
            container.innerHTML = headings;

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth(); 

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('calendarMonthYear').innerText = monthNames[month] + " " + year;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for(let i = 0; i < firstDayIndex; i++) {
                const blank = document.createElement('div');
                container.appendChild(blank);
            }

            for(let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';
                dayCell.innerText = day;

                const formattedMonth = String(month + 1).padStart(2, '0');
                const formattedDay = String(day).padStart(2, '0');
                const lookupKey = `${year}-${formattedMonth}-${formattedDay}`;

                if(dateColorMap[lookupKey]) {
                    if(dateColorMap[lookupKey] === 'PROFIT') dayCell.classList.add('cal-profit');
                    else if(dateColorMap[lookupKey] === 'LOSS') dayCell.classList.add('cal-loss');
                    else if(dateColorMap[lookupKey] === 'BOTH') dayCell.classList.add('cal-both');
                }
                container.appendChild(dayCell);
            }
        }

        function deleteTrade(tradeId) {
            if(confirm("Kya aap is trade log ko permanently delete karna chahte hain?")) {
                let userTrades = JSON.parse(localStorage.getItem('trades_' + currentActiveUser)) || [];
                userTrades = userTrades.filter(t => t.id !== tradeId);
                localStorage.setItem('trades_' + currentActiveUser, JSON.stringify(userTrades));
                loadTraderData();
                resetForm();
            }
        }

        function logout() {
            currentActiveUser = "";
            showPage('loginPage');
            resetForm();
        }
    </script>
</body>
</html>
